<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>X - Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }
        body {
            background-color: #ffffff;
            padding: 2rem 1.5rem;
            max-width: 500px;
            margin: 0 auto;
        }
        .back-arrow {
            font-size: 1.5rem;
            margin-bottom: 2rem;
            cursor: pointer;
            display: inline-block;
            text-decoration: none;
            color: #000;
        }
        .logo {
            text-align: center;
            margin-bottom: 2.5rem;
        }
        .logo svg {
            width: 40px;
            height: 40px;
            fill: #1da1f2;
        }
        h1 {
            font-size: 2.2rem;
            font-weight: 700;
            margin-bottom: 2rem;
            color: #000000;
        }
        .input-field, .select-field {
            width: 100%;
            padding: 1rem;
            border-radius: 6px;
            font-size: 1.1rem;
            margin-bottom: 1.2rem;
            outline: none;
            border: 1px solid #ccd6dd;
            background: #f8f9fa;
        }
        .input-field:focus, .select-field:focus {
            border-color: #1da1f2;
            border-width: 2px;
            background: #fff;
        }
        .password-container {
            position: relative;
        }
        .eye-icon {
            position: absolute;
            right: 1rem;
            top: 50%;
            transform: translateY(-50%);
            font-size: 1.2rem;
            color: #657786;
            cursor: pointer;
            user-select: none;
        }
        .save-option {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 1rem;
            font-size: 0.95rem;
            color: #333;
        }
        .forgot-link {
            display: inline-block;
            font-size: 1rem;
            color: #000000;
            text-decoration: none;
            margin-bottom: 2rem;
        }
        .continue-btn {
            width: 100%;
            padding: 1rem;
            border-radius: 9999px;
            border: none;
            background-color: #e1e8ed;
            color: #aab8c2;
            font-size: 1.1rem;
            font-weight: 500;
            margin-bottom: 2rem;
            text-decoration: none;
            display: block;
            text-align: center;
            cursor: not-allowed;
            transition: background 0.2s;
        }
        .continue-btn.active {
            background-color: #1da1f2;
            color: #ffffff;
            cursor: pointer;
        }
        .continue-btn.active:hover {
            background-color: #1991db;
        }
        .terms {
            font-size: 0.9rem;
            color: #657786;
            text-align: center;
            line-height: 1.5;
        }
        .terms a {
            color: #1da1f2;
            text-decoration: none;
        }
    </style>
</head>
<body>

    <a href="index.html" class="back-arrow">←</a>

    <div class="logo">
        <svg viewBox="0 0 24 24">
            <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/>
        </svg>
    </div>

    <h1>Login</h1>

    <!-- Saved Accounts Selection -->
    <select id="savedAccounts" class="select-field">
        <option value="">-- Select saved account --</option>
    </select>

    <!-- Email / Username Field -->
    <input type="text" id="username" class="input-field" placeholder="Enter email">

    <div class="password-container">
        <input type="password" id="password" class="input-field" placeholder="Password">
        <span class="eye-icon" id="eyeBtn">👁</span>
    </div>

    <div class="save-option">
        <input type="checkbox" id="saveCredentials">
        <label for="saveCredentials">Remember this account</label>
    </div>

    <a href="#" class="forgot-link">Forgot password?</a>

    <a href="#" class="continue-btn" id="continueBtn" onclick="login()">Continue</a>

    <p class="terms">
        By continuing, you agree to our <a href="#">Terms of Service</a>, <a href="#">Privacy Policy</a> and <a href="#">Cookie Use</a>.
    </p>

    <script>
        // Get email from URL parameter
        const params = new URLSearchParams(window.location.search);
        const emailParam = params.get('email');
        const usernameField = document.getElementById('username');
        const passwordInput = document.getElementById('password');
        const eyeBtn = document.getElementById('eyeBtn');
        const continueBtn = document.getElementById('continueBtn');
        const savedAccountsSelect = document.getElementById('savedAccounts');
        const saveCheckbox = document.getElementById('saveCredentials');

        // Load saved accounts from localStorage
        function loadSavedAccounts() {
            savedAccountsSelect.innerHTML = `<option value="">-- Select saved account --</option>`;
            const saved = JSON.parse(localStorage.getItem('savedLogins')) || [];
            saved.forEach(acc => {
                const opt = document.createElement('option');
                opt.value = JSON.stringify(acc);
                opt.textContent = acc.email;
                savedAccountsSelect.appendChild(opt);
            });
        }

        // Fill fields when selecting saved account
        savedAccountsSelect.addEventListener('change', () => {
            if (savedAccountsSelect.value) {
                const acc = JSON.parse(savedAccountsSelect.value);
                usernameField.value = acc.email;
                passwordInput.value = acc.pass;
                continueBtn.classList.add('active');
            } else {
                usernameField.value = '';
                passwordInput.value = '';
                continueBtn.classList.remove('active');
            }
        });

        // Pre-fill email if passed in URL
        if (emailParam) {
            usernameField.value = emailParam;
        }

        // Password show/hide toggle
        eyeBtn.addEventListener('click', function() {
            passwordInput.type = passwordInput.type === 'password' ? 'text' : 'password';
            eyeBtn.textContent = passwordInput.type === 'password' ? '👁' : '🙈';
        });

        // Enable button when password is entered
        passwordInput.addEventListener('input', function() {
            continueBtn.classList.toggle('active', passwordInput.value.trim().length > 0);
        });

        // Save credentials function
        function saveLogin(email, pass) {
            if (!saveCheckbox.checked) return;
            let saved = JSON.parse(localStorage.getItem('savedLogins')) || [];
            const exists = saved.some(a => a.email === email);
            if (!exists) {
                saved.push({ email, pass });
                localStorage.setItem('savedLogins', JSON.stringify(saved));
                loadSavedAccounts();
            }
        }

        // Login logic
        function login() {
            const username = usernameField.value.trim();
            const password = passwordInput.value.trim();

            if (!username || !password) {
                alert("Please fill in both fields.");
                return;
            }

            // Check valid accounts
            if (username === "gianlance306@gmail.com" && password === "122660") {
                saveLogin(username, password);
                window.location.href = "gian.html";
            } else if (username === "lokiloks23@gmail.com" && password === "200623") {
                saveLogin(username, password);
                window.location.href = "louisAlbertAboutMe.html";
            } else {
                alert("Invalid username or password.");
            }
        }

        // Load saved accounts on page open
        window.addEventListener('load', loadSavedAccounts);
    </script>

</body>
</html>
